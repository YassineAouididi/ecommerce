services:

  mongodb:
    image: mongo
    container_name: mongodb

    restart: always

    ports:
      - "27017:27017"

  backend:
    build: ./backend

    container_name: backend

    restart: always

    ports:
      - "3000:3000"

    environment:
      MONGO_URI: mongodb://mongodb:27017/ecommerce

    depends_on:
      - mongodb

  nginx:
    image: nginx:latest

    container_name: nginx

    restart: always

    ports:
      - "80:80"

    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - backend

