<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="card shadow-lg border-0 rounded-lg overflow-hidden">
          <!-- Card Header -->
          <div style="background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 40px; text-align: center; color: white;">
            <i class="fas fa-user-plus fa-3x mb-3"></i>
            <h2 class="h3 fw-bold mb-2">eStore</h2>
            <p class="opacity-75">Create a new account</p>
          </div>

          <!-- Card Body -->
          <div class="card-body p-5">
            <form id="registerForm">
              <div class="mb-4">
                <label for="name" class="form-label fw-600">Full Name</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-user text-muted"></i>
                  </span>
                  <input type="text" class="form-control border-start-0" id="name" placeholder="Enter your full name" required>
                </div>
              </div>

              <div class="mb-4">
                <label for="email" class="form-label fw-600">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-envelope text-muted"></i>
                  </span>
                  <input type="email" class="form-control border-start-0" id="email" placeholder="Enter your email" required>
                </div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-600">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-lock text-muted"></i>
                  </span>
                  <input type="password" class="form-control border-start-0" id="password" placeholder="Enter password (min 6 characters)" required>
                </div>
                <small class="text-muted d-block mt-2">
                  <i class="fas fa-info-circle me-1"></i>
                  Must be at least 6 characters long
                </small>
              </div>

              <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-600">Confirm Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-lock text-muted"></i>
                  </span>
                  <input type="password" class="form-control border-start-0" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
              </div>

              <div class="mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                  <label class="form-check-label" for="agreeTerms">
                    I agree to the <a href="#" class="text-decoration-none" style="color: var(--primary);">terms and conditions</a>
                  </label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 btn-lg fw-600 mb-3">
                <i class="fas fa-user-check me-2"></i>Create Account
              </button>

              <div class="text-center">
                <p class="text-muted mb-0">
                  Already have an account? 
                  <a href="/pages/login.html" class="fw-bold text-decoration-none" style="color: var(--primary);">
                    Login here
                  </a>
                </p>
              </div>
            </form>
          </div>
        </div>

        <!-- Additional Info -->
        <div class="text-center mt-4 text-white">
          <p class="small opacity-75">© 2024 eStore. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const agreeTerms = document.getElementById('agreeTerms').checked;

      // Validation
      if (!agreeTerms) {
        alert('Please agree to the terms and conditions');
        return;
      }

      if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
      }

      if (password.length < 6) {
        alert('Password must be at least 6 characters long');
        return;
      }

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, confirmPassword })
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          alert('Account created successfully!');
          window.location.href = '/';
        } else {
          alert(result.message || 'Registration failed');
        }
      } catch (error) {
        console.error('Error:', error);
        alert('Error during registration');
      }
    });
  </script>
</body>
</html>
