<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - eStore</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card shadow-lg border-0 rounded-lg overflow-hidden">
          <!-- Card Header -->
          <div style="background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 40px; text-align: center; color: white;">
            <i class="fas fa-store fa-3x mb-3"></i>
            <h2 class="h3 fw-bold mb-2">eStore</h2>
            <p class="opacity-75">Sign in to your account</p>
          </div>

          <!-- Card Body -->
          <div class="card-body p-5">
            <form id="loginForm">
              <div class="mb-4">
                <label for="email" class="form-label fw-600">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-envelope text-muted"></i>
                  </span>
                  <input type="email" class="form-control border-start-0" id="email" placeholder="Enter your email" required>
                </div>
              </div>

              <div class="mb-4">
                <label for="password" class="form-label fw-600">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="fas fa-lock text-muted"></i>
                  </span>
                  <input type="password" class="form-control border-start-0" id="password" placeholder="Enter your password" required>
                </div>
              </div>

              <div class="mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="rememberMe">
                  <label class="form-check-label" for="rememberMe">
                    Remember me
                  </label>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 btn-lg fw-600 mb-3">
                <i class="fas fa-sign-in-alt me-2"></i>Login
              </button>

              <div class="text-center">
                <p class="text-muted mb-0">
                  Don't have an account? 
                  <a href="/pages/register.html" class="fw-bold text-decoration-none" style="color: var(--primary);">
                    Register here
                  </a>
                </p>
              </div>
            </form>
          </div>
        </div>

        <!-- Additional Info -->
        <div class="text-center mt-4 text-white">
          <p class="small opacity-75">© 2024 eStore. All rights reserved.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem('token', result.token);
          localStorage.setItem('user', JSON.stringify(result.user));
          
          if (rememberMe) {
            localStorage.setItem('rememberEmail', email);
          }
          
          // Redirect based on user role
          if (result.user.role === 'admin') {
            window.location.href = '/pages/admin-dashboard.html';
          } else {
            window.location.href = '/';
          }
        } else {
          alert('Login failed: ' + (result.message || 'Invalid credentials'));
        }
      } catch (error) {
        console.error('Login error:', error);
        alert('An error occurred. Please try again.');
      }
    });

    // Load remembered email if available
    window.addEventListener('DOMContentLoaded', () => {
      const rememberEmail = localStorage.getItem('rememberEmail');
      if (rememberEmail) {
        document.getElementById('email').value = rememberEmail;
        document.getElementById('rememberMe').checked = true;
      }
    });
  </script>

        console.error('Error:', error);

  </script>
</body>
</html>
