name: Full DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  terraform:

    name: Provision Infrastructure

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    outputs:
      instance_ip: ${{ steps.export.outputs.instance_ip }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4

        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Export Instance IP
        id: export
        run: |
          IP=$(terraform output -raw instance_public_ip)
          echo "instance_ip=$IP" >> $GITHUB_OUTPUT

  ansible:

    name: Configure Server

    runs-on: ubuntu-latest

    needs: terraform

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Generate Inventory
        run: |
          echo "[web]" > inventory.ini
          echo "${{ needs.terraform.outputs.instance_ip }} ansible_user=ec2-user ansible_ssh_private_key_file=key.pem" >> inventory.ini

      - name: Run Ansible Deployment
        run: |
          ansible-playbook -i inventory.ini ansible/deploy.yml

        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
